  deploy_staging:
    # if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server'
    name: Deploy to Staging Compute Engine
    runs-on: ubuntu-latest
    # needs: [docker_build_and_push]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare runtime secret directory
        run: mkdir -p deployment/secrets

      - name: Add runtime creds file
        id: create-runtime-creds-json
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "deployment/secrets/creds.json"
          json: ${{ secrets.STAGING_CREDS_JSON }}

      - name: Add runtime service key json file
        id: create-runtime-service-key-json
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "deployment/secrets/michael2-service-key.json"
          json: ${{ secrets.STAGING_SERVICE_KEY_JSON }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: "https://github.com/${{ github.repository }}"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Check identity
        run: gcloud auth list

      - name: Copy files to staging (OS Login)
        run: |
          set -euo pipefail

          PROJECT_ID="${{ secrets.STAGING_PROJECT_ID }}"
          INSTANCE_NAME="${{ secrets.STAGING_INSTANCE_NAME }}"
          ZONE="${{ secrets.STAGING_ZONE }}"

          # Ensure remote directories exist
          gcloud compute ssh "${INSTANCE_NAME}" \
            --project "${PROJECT_ID}" \
            --zone "${ZONE}" \
            --command "mkdir -p deployment/nginx/staging deployment/nginx/isgs deployment/secrets"

          # Copy files (destination uses OS Login username automatically; no explicit username)
          gcloud compute scp deployment/docker-compose.yml \
            "${INSTANCE_NAME}:./deployment/docker-compose.yml" \
            --project "${PROJECT_ID}" --zone "${ZONE}"

          gcloud compute scp deployment/nginx/staging/default.conf \
            "${INSTANCE_NAME}:./deployment/nginx/staging/default.conf" \
            --project "${PROJECT_ID}" --zone "${ZONE}"

          gcloud compute scp deployment/nginx/isgs/default.conf \
            "${INSTANCE_NAME}:./deployment/nginx/isgs/default.conf" \
            --project "${PROJECT_ID}" --zone "${ZONE}"

          gcloud compute scp deployment/secrets/creds.json \
            "${INSTANCE_NAME}:./deployment/secrets/creds.json" \
            --project "${PROJECT_ID}" --zone "${ZONE}"

          gcloud compute scp deployment/secrets/michael2-service-key.json \
            "${INSTANCE_NAME}:./deployment/secrets/michael2-service-key.json" \
            --project "${PROJECT_ID}" --zone "${ZONE}"

      - name: Run docker-compose on staging (docker compose up -d)
        run: |
          set -euo pipefail

          PROJECT_ID="${{ secrets.STAGING_PROJECT_ID }}"
          INSTANCE_NAME="${{ secrets.STAGING_INSTANCE_NAME }}"
          ZONE="${{ secrets.STAGING_ZONE }}"

          gcloud compute ssh "${INSTANCE_NAME}" \
            --project "${PROJECT_ID}" \
            --zone "${ZONE}" \
            --quiet \
            --command "bash -lc '
              set -euo pipefail
              cd deployment

              echo \"Logging into Docker Hub...\"
              echo \"${{ secrets.DOCKERHUB_ACCESS_TOKEN }}\" | sudo docker login -u \"${{ secrets.DOCKERHUB_USERNAME }}\" --password-stdin

              # Optional: stop old containers
              sudo docker compose down || true

              # Pull updated image and start
              sudo docker compose pull
              sudo docker compose up -d
            '"
       
