
name: Deploy Docker Image, Staging Server

on:
  push:
    branches: [main]

defaults:
  run:
    # -l: login shell, needed when using Conda
    shell: bash -l {0}

env:
  PIP_PROGRESS_BAR: "off"
  DEPLOY_ENV: staging

jobs:

  docker_build_and_push:
    if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server'
    name: Push docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          ecr: auto
          logout: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Extract metadata (labels, tags, etc.) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
            images: michaelpescelbl/orphaned-wells-ui-server
    
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
            context: .
            file: ./deployment/dockerfile
            push: true
            tags: michaelpescelbl/orphaned-wells-ui-server:latest
            labels: ${{ steps.meta.outputs.labels }}

  deploy_staging:
    if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server'
    needs: [ docker_build_and_push ]
    uses: CATALOG-Historic-Records/orphaned-wells-ui-server/.github/workflows/deploy.yml@main
    with:
      DEPLOY_ENV: staging
    secrets: inherit