name: Deploy OSAGE Server to GKE

on:
  push:
    branches: [osage]
  workflow_dispatch:

jobs:
  deploy_gke_osage:
    if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server' && (github.event_name == 'workflow_dispatch' || vars.ENABLE_GKE_OSAGE_DEPLOY == 'true' || vars.ENABLE_GKE_DEPLOYMENTS == 'true')
    uses: ./.github/workflows/deploy-k8s-dispatch.yml
    with:
      DEPLOY_ENV: osage
    secrets: inherit
