
name: Deploy ISGS Server

on:
  push:
    branches: [isgs]

defaults:
  run:
    # -l: login shell, needed when using Conda
    shell: bash -l {0}

env:
  PIP_PROGRESS_BAR: "off"

jobs:

  deploy_isgs:
    if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server'
    name: Deploy to ISGS Compute Engine
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Prepare runtime secret directory
          run: mkdir -p deployment/secrets

        - name: Add runtime creds file
          id: create-runtime-creds-json
          uses: jsdaniell/create-json@v1.2.3
          with:
            name: "deployment/secrets/creds.json"
            json: ${{ secrets.STAGING_CREDS_JSON }}

        - name: Add runtime service key json file
          id: create-runtime-service-key-json
          uses: jsdaniell/create-json@v1.2.3
          with:
            name: "deployment/secrets/michael2-service-key.json"
            json: ${{ secrets.STAGING_SERVICE_KEY_JSON }}

        - name: copy file via ssh key
          uses: appleboy/scp-action@v0.1.4
          with:
            host: ${{ secrets.ISGS_BACKEND_IP }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            source: "deployment/docker-compose.yml, deployment/nginx/isgs/default.conf, deployment/secrets/creds.json, deployment/secrets/michael2-service-key.json"
            target: .
            strip_components: 1

        - name: run docker-compose
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.ISGS_BACKEND_IP }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            script: |
                if [ -s deployment/secrets/creds.json ]; then
                  mkdir -p secrets
                  cp deployment/secrets/creds.json secrets/creds.json
                  cp deployment/secrets/michael2-service-key.json secrets/michael2-service-key.json
                fi
                test -s secrets/creds.json
                test -s secrets/michael2-service-key.json
                chmod 600 secrets/creds.json secrets/michael2-service-key.json
                echo ${{ secrets.DOCKERHUB_ACCESS_TOKEN }} | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
                sudo docker compose down
                sudo docker rmi -f $(sudo docker images -q)
                sudo docker compose pull
                sudo docker compose up -d
