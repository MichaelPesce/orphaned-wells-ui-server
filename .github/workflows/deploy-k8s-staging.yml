name: Deploy Staging Server to GKE

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash -l {0}

env:
  PIP_PROGRESS_BAR: "off"

jobs:
  docker_build_and_push:
  #   # if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server'
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_GKE_STAGING_DEPLOY == 'true' || vars.ENABLE_GKE_DEPLOYMENTS == 'true'
    name: Push docker image to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "image_tag=staging-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Verify checked out source
        run: |
          echo "Building commit ${GITHUB_SHA}"
          grep -n 'import logging.handlers' ogrre/internal/settings.py
          grep -n 'normalized_path = path.rstrip' ogrre/routers/router.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          ecr: auto
          logout: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: michaelpescelbl/orphaned-wells-ui-server

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/dockerfile
          push: true
          tags: |
            michaelpescelbl/orphaned-wells-ui-server:latest
            michaelpescelbl/orphaned-wells-ui-server:${{ steps.image.outputs.image_tag }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_gke_staging:
    # if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server' && (github.event_name == 'workflow_dispatch' || vars.ENABLE_GKE_STAGING_DEPLOY == 'true' || vars.ENABLE_GKE_DEPLOYMENTS == 'true')
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_GKE_STAGING_DEPLOY == 'true' || vars.ENABLE_GKE_DEPLOYMENTS == 'true'
    needs: docker_build_and_push
    uses: ./.github/workflows/deploy-k8s-dispatch.yml
    with:
      DEPLOY_ENV: staging
      IMAGE_TAG: ${{ needs.docker_build_and_push.outputs.image_tag }}
    secrets: inherit
