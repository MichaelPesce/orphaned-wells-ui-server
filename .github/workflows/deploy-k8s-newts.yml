name: Deploy NEWTS Server to GKE

on:
  push:
    branches: [newts]
  workflow_dispatch:

jobs:
  deploy_gke_newts:
    if: github.repository == 'CATALOG-Historic-Records/orphaned-wells-ui-server' && (github.event_name == 'workflow_dispatch' || vars.ENABLE_GKE_NEWTS_DEPLOY == 'true' || vars.ENABLE_GKE_DEPLOYMENTS == 'true')
    uses: ./.github/workflows/deploy-k8s-dispatch.yml
    with:
      DEPLOY_ENV: newts
    secrets: inherit
